# brailix CI — lint and type-check, plus unit tests on Linux and Windows.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install uv
        # Pinned to the full commit SHA: a tag — even a patch release like
        # v8.2.0 — is a movable ref, so only a commit SHA is an immutable
        # supply-chain anchor (per GitHub's secure-use guidance). The trailing
        # comment keeps the human-readable version; bump the SHA and comment
        # together. (setup-uv also stopped publishing floating major tags at v8.)
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Ruff (lint)
        run: uv run ruff check

      - name: Mypy (type-check)
        run: uv run mypy brailix

  test:
    name: tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other OS when one fails — we want both results.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      # Install every adapter the suite exercises so nothing skips: the light
      # Chinese engines (jieba / thulac / g2pM + numpy / pypinyin via ``zh``),
      # LaTeX math (latex2mathml), docx input (python-docx / lxml / olefile),
      # the music sources (mido / partitura / abc-xml-converter), tactile
      # graphics (Pillow decodes bitmaps, resvg rasterizes external SVGs), and
      # all three Japanese analyzers (janome / fugashi / sudachi). The `dev`
      # group (pytest etc.) comes in by default. Installing graphics matters
      # for coverage too: without it the tactile-graphics tests importorskip
      # and that whole vertical counts as uncovered.
      #
      # The two heavyweight neural Chinese engines — ``hanlp`` and ``g2pw`` —
      # are deliberately left OUT: no test here exercises their inference
      # (only path / error-string tests touch them) and they drag in torch.
      # Their coverage lives in the scheduled heavyweight-adapters workflow.
      # The known transformers hazard (5.0 removed BertTokenizer.encode_plus,
      # which hanlp calls at inference) is fenced twice: the ``hanlp`` extra
      # pins ``transformers<4.55``, and the adapter refuses to load under
      # transformers>=5 so the ``auto`` chain skips it instead of crashing.
      - name: Install dependencies
        run: >-
          uv sync
          --extra zh --extra thulac --extra g2pm --extra latex
          --extra docx --extra music --extra graphics --extra graphics-svg-raster
          --extra ja --extra fugashi --extra sudachi

      # Branch-coverage gate. ``[tool.coverage.run]`` in pyproject already sets
      # ``branch = true`` and ``source = ["brailix"]``; here we fail the build
      # if a change drags core coverage below 94% (it currently sits around
      # 94.9%), so coverage can't silently erode. ``term-missing`` prints the
      # uncovered lines in the log for whoever has to close the gap.
      - name: Run the test suite
        run: >-
          uv run pytest
          --cov=brailix --cov-report=term-missing --cov-fail-under=94

  wheel:
    name: wheel build + clean-install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Build the wheel
        run: uv build --wheel

      # Install the built wheel into a fresh, dependency-free venv (no dev
      # group, no extras) and drive the CLI. This catches packaging faults the
      # editable dev install hides: a missing entry point, or profile /
      # resource JSON left out of the wheel (a bare core install must still
      # load a profile and translate). Number-only input needs no optional
      # adapter, so the core wheel alone must render it end to end.
      - name: Clean-install the wheel and smoke-test the CLI
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/*.whl
          /tmp/smoke/bin/brailix --version
          /tmp/smoke/bin/brailix --list-profiles
          out=$(/tmp/smoke/bin/brailix "123" --profile cn_current)
          printf 'translated output: %s\n' "$out"
          test -n "$out"
