# brailix CI — lint and type-check, plus unit tests on Linux and Windows.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: lint + type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        # setup-uv stopped publishing floating major tags with v8 — pin the
        # exact (immutable) release tag.
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Ruff (lint)
        run: uv run ruff check

      - name: Mypy (type-check)
        run: uv run mypy brailix

  test:
    name: tests (${{ matrix.os }}, py${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}
    strategy:
      # Don't cancel the other OS when one fails — we want both results.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true

      # Install every adapter the suite exercises so nothing skips: the light
      # Chinese engines (jieba / thulac / g2pM + numpy / pypinyin via ``zh``),
      # LaTeX math (latex2mathml), docx input (python-docx / lxml / olefile),
      # the music sources (mido / partitura / abc-xml-converter) and all three
      # Japanese analyzers (janome / fugashi / sudachi). The `dev` group
      # (pytest etc.) comes in by default.
      #
      # The two heavyweight neural Chinese engines — ``hanlp`` and ``g2pw`` —
      # are deliberately left OUT: no test exercises their inference (only
      # path / error-string tests touch them), they drag in torch, and hanlp
      # is currently broken against recent transformers (BertTokenizer dropped
      # ``encode_plus``), which the ``auto`` analyzer would hit if installed.
      - name: Install dependencies
        run: >-
          uv sync
          --extra zh --extra thulac --extra g2pm --extra latex
          --extra docx --extra music
          --extra ja --extra fugashi --extra sudachi

      # Branch-coverage gate. ``[tool.coverage.run]`` in pyproject already sets
      # ``branch = true`` and ``source = ["brailix"]``; here we fail the build
      # if a change drags core coverage below 93%, so coverage can't silently
      # erode. The ceiling is ~93.4%, not higher, because this job omits the
      # graphics extra (Pillow / resvg): the tactile-graphics code counts in
      # ``source = brailix`` but its tests ``importorskip``, so it stays
      # uncovered here. Raising the gate would mean installing that extra so
      # graphics is exercised. ``term-missing`` prints the uncovered lines.
      - name: Run the test suite
        run: >-
          uv run pytest
          --cov=brailix --cov-report=term-missing --cov-fail-under=93

  wheel:
    name: wheel build + clean-install smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          python-version: "3.13"
          enable-cache: true

      - name: Build the wheel
        run: uv build --wheel

      # Install the built wheel into a fresh, dependency-free venv (no dev
      # group, no extras) and drive the CLI. This catches packaging faults the
      # editable dev install hides: a missing entry point, or profile /
      # resource JSON left out of the wheel (a bare core install must still
      # load a profile and translate). Number-only input needs no optional
      # adapter, so the core wheel alone must render it end to end.
      - name: Clean-install the wheel and smoke-test the CLI
        run: |
          uv venv --python 3.13 /tmp/smoke
          uv pip install --python /tmp/smoke/bin/python dist/*.whl
          /tmp/smoke/bin/brailix --version
          /tmp/smoke/bin/brailix --list-profiles
          out=$(/tmp/smoke/bin/brailix "123" --profile cn_current)
          printf 'translated output: %s\n' "$out"
          test -n "$out"
